name: offgrid
description: Communicate. Navigate. Survive — Without Internet
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9

  # Bluetooth mesh
  flutter_blue_plus: ^1.31.15

  # WiFi Direct (Android only)
  nearby_connections: ^4.1.0

  # Local Database
  sqflite: ^2.3.2
  path: ^1.9.0

  # Maps & GPS (offline capable)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0

  # Encryption
  encrypt: ^5.0.3
  pointycastle: ^3.9.1

  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/maps/
    - assets/icons/